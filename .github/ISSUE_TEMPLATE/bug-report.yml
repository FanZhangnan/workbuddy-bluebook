name: Site bug
description: Report a build, navigation, search, display, or accessibility bug
title: "[Bug]: "
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed and expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser, device, and page path
    validations:
      required: true
  - type: textarea
    id: accessibility
    attributes:
      label: Accessibility impact, if any
