name: Correction
description: Report a factual, version, safety, or editorial issue
title: "[Correction]: "
body:
  - type: input
    id: page
    attributes:
      label: Page path
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current statement and impact
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Official or primary evidence
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed correction
