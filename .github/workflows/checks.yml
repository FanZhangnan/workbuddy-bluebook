name: checks
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm
      - run: npm ci
      - run: npm run validate:content
      - run: npm run docs:build
